[[language]]
name = "go"
roots = ["go.work", "go.mod"]
formatter = { command = "goimports" }

[[language]]
name = "rust"
scope = "source.rust"
roots = ["Cargo.toml", "Cargo.lock"]
formatter = { command = "leptosfmt", args = ["--stdin", "--rustfmt"] }
language-servers = ["rust-analyzer", "tailwindcss-ls"]

[[language]]
name = "typescript"
formatter = { command = "bunx", args = ["prettier", "--parser", "typescript"] }
language-servers = [
  # "tsgo",
  "typescript-language-server",
  "eslint",
]

[[language]]
name = "tsx"
formatter = { command = "bunx", args = ["prettier", "--parser", "typescript"] }
language-servers = [
  # "tsgo",
  "tailwindcss-ls",
  "typescript-language-server",
  "eslint",
  "emmet-ls",
]

[[language]]
name = "javascript"
formatter = { command = "bunx", args = ["prettier", "--parser", "typescript"] }
language-servers = [
  # "tsgo",
  "typescript-language-server",
  "eslint",
]

[[language]]
name = "jsx"
formatter = { command = "bunx", args = ["prettier", "--parser", "typescript"] }
language-servers = [
  # "tsgo",
  "tailwindcss-ls",
  "typescript-language-server",
  "eslint",
  "emmet-ls",
]

[[language]]
name = "java"
scope = "source.java"
injection-regex = "java"
file-types = ["java"]
roots = ["pom.xml", "build.gradle"]
indent = { tab-width = 4, unit = "    " }
formatter = { command = "google-java-format", args = ["-"] }
language-servers = ["jdtls"]

[[language]]
name = "html"
formatter = { command = "prettier", args = ["--parser", "html"] }
language-servers = ["vscode-html-language-server", "tailwindcss-ls", "emmet-ls"]

[[language]]
name = "css"
formatter = { command = "prettier", args = ["--parser", "css"] }
language-servers = ["vscode-css-language-server", "tailwindcss-ls"]

[[language]]
name = "toml"
formatter = { command = "taplo", args = ["format", "-"] }

[[language]]
name = "typst"
formatter = { command = "typstyle" }

[[language]]
name = "yaml"
file-types = ["yml", "yaml"]
formatter = { command = "prettier", args = ["--parser", "yaml"] }

[[language]]
name = "helm"
file-types = ["yml", "yaml"]
formatter = { command = "prettier", args = ["--parser", "yaml"] }

[[language]]
name = "c"
file-types = ["c", "h"]
formatter = { command = 'clang-format' }
indent = { tab-width = 4, unit = "    " }
auto-format = true

[[language]]
name = "cpp"
file-types = ["cpp", "cc", "cxx", "hpp", "hcc", "hxx"]
formatter = { command = 'clang-format' }
indent = { tab-width = 4, unit = "    " }

[[language]]
name = "github-actions"
scope = ".github"
file-types = [
  { glob = ".github/workflows/*.yml" },
  { glob = ".github/workflows/*.yaml" },
]
formatter = { command = "prettier", args = ["--parser", "yaml"] }
language-servers = ["gh-actions-language-server", "yaml-language-server"]
roots = [".github", ".git"]

[[language]]
name = "python"
formatter = { command = "ruff", args = ["format", "--line-length", "88", "-"] }

[[language]]
name = "markdown"
formatter = { command = 'prettier', args = ["--parser", "markdown"] }
language-servers = ["marksman", "mdpls"]

[[language]]
name = "json"
formatter = { command = 'prettier', args = ["--parser", "json"] }

[[language]]
name = "jsonc"
formatter = { command = 'prettier', args = ["--parser", "jsonc"] }

[[language]]
name = "dockerfile"
language-servers = ["docker-language-server"]

[[language]]
name = "sql"
language-servers = ["sql-language-server"]
indent = { tab-width = 2, unit = "  " }
formatter = { command = "sqlformat", args = [
  "--reindent",
  "--indent_width",
  "4",
  "--keywords",
  "upper",
  "--identifiers",
  "lower",
  "-",
] }

[[language]]
name = "helm"
scope = "source.helm"
file-types = ["templates/*.yaml"]
roots = ["Chart.yaml"]

[language-server.gopls]
gofumpt = true

[language-server.nu]
command = "nu"
args = ["--lsp"]

[language-server.docker-language-server]
command = "docker-language-server"
args = ["start"]

[language-server.gh-actions-language-server]
command = "gh-actions-language-server"
args = ["--stdio"]
config = { sessionToken = "" }

[language-server.yaml-language-server.config.yaml]
format = { enable = true }
validation = true

[language-server.yaml-language-server.config.yaml.schemas]
"https://json.schemastore.org/github-workflow.json" = ".github/workflows/*.{yml,yaml}"
"https://raw.githubusercontent.com/ansible-community/schemas/main/f/ansible-tasks.json" = "roles/{tasks,handlers}/*.{yml,yaml}"

[language-server.tsgo]
command = "tsgo"
args = ["--lsp", "--stdio"]

[language-server.emmet-ls]
command = "emmet-ls"
args = ["--stdio"]

[language-server.eslint]
args = ["--stdio"]
command = "vscode-eslint-language-server"

[language-server.mdpls]
command = "mdpls"
config = { markdown.preview.auto = true }

[language-server.sql-language-server]
command = "sql-language-server"
args = ["up", "--method", "stdio"]

[language-server.rust-analyzer.config]
check.command = "clippy"
cargo.features = "all"
# procMacro = { enable = true, ignored = { leptos_macro = [
#   "component",
#   "server",
# ] } }
rustfmt.overrideCommand = ["leptosfmt", "--stdin", "--rustfmt"]

[language-server.jdtls]
command = "jdtls"
args = ["-data", "~/.cache/jdtls/workspace"]

[language-server.tailwindcss-ls]
command = "tailwindcss-language-server"
args = ["--stdio"]

[language-server.tailwindcss-ls.config]
userLanguages = { rs = "html", "*.rs" = "html" }

[language-server.tailwindcss-ls.config.tailwindCSS]
experimental = { classRegex = [["class=\"(.*)\""]] }
includeLanguages = { rust = "html", "*.rs" = "html" }
