# Copy this file to ~/.config/tsm/config.toml to customize TSM.
#
# Precedence:
# 1. built-in defaults
# 2. ~/.config/tsm/config.toml
# 3. TSM_TUI_MODE / TSM_TUI_KEYMAP / TSM_CONFIG_FILE
# 4. CLI flags like `tsm tui --simplified --keymap palette`

[shell.shortcuts]
# Shortcuts are applied inside TSM-managed interactive shells (zsh, bash, fish).
# They do not create a global launcher outside TSM by themselves.
# Set an action shortcut to "" to disable it.
# full = ""          # Open the full TUI from a TSM-managed shell.
palette = "ctrl+]" # Open the simplified session palette from a TSM-managed shell.
# toggle = ""        # Switch to the previous session from a TSM-managed shell.

[tui]
# mode = "full"
# keymap = "default"
# show_help = true

[tui.keymaps.default]
move_up = ["j"]                # Move selection up.
move_down = ["k"]              # Move selection down.
move_left = ["h"]              # Scroll preview left.
move_right = ["l"]             # Scroll preview right.
toggle_select_all = ["ctrl+a"] # Select or clear all visible sessions.
toggle_select = ["space"]      # Select the highlighted session.
attach = ["enter"]             # Attach to the highlighted session.
detach = ["d"]                 # Detach the selected session(s).
new_session = ["n"]            # Create a new session.
kill = ["k"]                   # Kill the selected session(s).
rename = ["r"]                 # Rename the highlighted session.
copy_command = ["c"]           # Copy `tsm attach <name>`.
sort = ["s"]                   # Cycle the session sort mode.
toggle_layout = ["ctrl+o"]     # Switch between simplified and full TUI.
mux_open = ["w"]               # Open a workspace manifest.
filter = ["/"]                 # Start filtering sessions.
refresh = ["ctrl+r"]           # Refresh sessions, previews, and agent status.
quit = ["q"]                   # Quit the TUI.
force_quit = ["ctrl+c"]        # Quit immediately.
log_up = ["["]                 # Scroll the activity log up.
log_down = ["]"]               # Scroll the activity log down.

[tui.keymaps.palette]
move_up = ["up", "ctrl+p"]     # Move selection up.
move_down = ["down", "ctrl+n"] # Move selection down.
move_left = ["left"]           # Scroll preview left.
move_right = ["right"]         # Scroll preview right.
toggle_select_all = ["ctrl+a"] # Select or clear all visible sessions.
toggle_select = ["tab"]        # Select the highlighted session.
attach = ["enter"]             # Attach to the highlighted session.
detach = ["ctrl+d"]            # Detach the selected session(s).
new_session = ["ctrl+t"]       # Create a new session.
kill = ["ctrl+x"]              # Kill the selected session(s).
rename = ["r"]                 # Rename the highlighted session.
copy_command = ["ctrl+y"]      # Copy `tsm attach <name>`.
sort = ["ctrl+s"]              # Cycle the session sort mode.
toggle_layout = ["ctrl+o"]     # Switch between simplified and full TUI.
mux_open = ["ctrl+w"]          # Open a workspace manifest.
filter = ["ctrl+f"]            # Start filtering sessions.
refresh = ["ctrl+r"]           # Refresh sessions, previews, and agent status.
quit = ["q"]                   # Quit the TUI.
force_quit = ["ctrl+c"]        # Quit immediately.
log_up = ["["]                 # Scroll the activity log up.
log_down = ["]"]               # Scroll the activity log down.
